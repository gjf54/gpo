services:

  nginx:
    container_name: gpo-nginx
    image: nginx:stable
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www:cached

  php:
    container_name: gpo-php
    build: 
      dockerfile: docker/dockerfiles/php.dockerfile
    volumes:
      - ./:/var/www
    expose:
      - '9000'
    depends_on:
      - mysql
      - nginx

  mysql:
    container_name: gpo-mysql
    image: mysql:8.0
    volumes:
      - ./docker/database/data:/var/lib/mysql
    env_file:
      - docker.env